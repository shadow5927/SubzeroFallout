
block.subzerofallout-core-rampart.name = Core: Rampart
block.subzerofallout-core-rampart.description = Core of the base. Reinforced. Weaker than it's older iterations, however cheaper and more compact.  Once destroyed, the sector is lost.
block.subzerofallout-core-rampart.details = This cradle serves as your ticket into a future. A future that you may or may not be ready for. Nonetheless, there is no going back now.

block.subzerofallout-carbonic-extractor.name = Carbonic Extractor
block.subzerofallout-carbonic-extractor.description = Separates heavy quantities of Carbon from Tyr's volcanic atmosphere. Can be boosted by placing it on vents.

block.subzerofallout-ferrum-smelter.name = Ferrum Smelter
block.subzerofallout-ferrum-smelter.description = Melts down Magnetite fragments into Iron. Requires heat and power to operate.

block.subzerofallout-bulk-driver.name = Bulk Driver
block.subzerofallout-bulk-driver.description = Long-ranged item transport structure.  Send large clumps of resources to other Bulk Drivers.

block.subzerofallout-windmill.name = Windmill
block.subzerofallout-windmill.description = Generates small amounts of power from Tyr's atmosphere.

block.subzerofallout-capacitor.name = Capacitor
block.subzerofallout-capacitor.description = Stores power when there is extra. Power slowly drains from Capacitors over time.

block.subzerofallout-thermal-siphon.name = Thermal Siphon
block.subzerofallout-thermal-siphon.description = Generates Power when constructed in suited environments.

block.subzerofallout-carbon-heater.name = Carbon Heater
block.subzerofallout-carbon-heater.description = Applies heat to structures. Requires Carbon to operate.

block.subzerofallout-rapid-assembler.name = Rapid Assembler
block.subzerofallout-rapid-assembler.description = Constructs Fast moving units. Units can be moved to the Forge to be upgraded.

block.subzerofallout-support-assembler.name = Support Assembler
block.subzerofallout-support-assembler.description = Constructs Supportive units. Units can be moved to the Forge to be upgraded.

block.subzerofallout-specialist-assembler.name = Specialist Assembler
block.subzerofallout-specialist-assembler.description = Constructs Specialized units. Units can be moved to the Forge to be upgraded.

block.subzerofallout-spear.name = Spear
block.subzerofallout-spear.description = A fusion between the Lancer and Afflict Turrets, Spear fires a charged orb of energy beams.
block.subzerofallout-spear.details = The Crux, even all the way out here, have no shortage of assimilating technology.  You, my entourage, are no different in this sense.

block.subzerofallout-sc-1.name = SC-1
block.subzerofallout-sc-1.description = Shred Cannon 01. Fires a singular high-speed shell, tearing armor and immobilizing units.
block.subzerofallout-sc-1.details = Even with the molten surface of Tyr, there were pockets that were left unharmed. These eventually became the few consistent outposts that rest on the shifting surface of this moon.

item.subzerofallout-haematite.name = Haematite
item.subzerofallout-haematite.description = Chunks of ore from Haematite Deposits. Can be refined into something more useful.
item.subzerofallout-haematite.details = Mmmm, rust.

item.subzerofallout-iron.name = Iron
item.subzerofallout-iron.description = Used within multiple fields of construction and ammunition on Tyr.

item.subzerofallout-obsidian-shard.name = Obsidian Shard
item.subzerofallout-obsidian.description = Volcanic Glass formed from the crags of Tyr after eruptions. Can be used to hold and transport fluids.

item.subzerofallout-arsenic.name = Arsenic
item.subzerofallout-arsenic.description = A toxic material that can be used in refining and electronics.

item.subzerofallout-heavy-plating.name = Heavy Plating
item.subzerofallout-heavy-plating.description = Used in reinforcing advanced structures and defenses.

item.subzerofallout-ignis-glass.name = Ignis Glass
item.subzerofallout-ignis-glass.description = Used in reinforcing advanced logistics.

unit.subzerofallout-enkindle.name = Enkindle
unit.subzerofallout-enkindle.description = Constructs defenses to protect the Rampart Core. Can also be used to scout the area around, but not by a lot.

unit.subzerofallout-flare.name = Flare
unit.subzerofallout-flare.description = Fires a continuous jet of flame at enemies.  Pierces armored enemies.
unit.subzerofallout-flare-details = The name of this tank overlaps with a small fighter they have also produced. The name must have slipped this fragment of the enemy.

unit.subzerofallout-nerve.name = Nerve
unit.subzerofallout-nerve.description = Supports by shocking enemies and healing allies in an energy field.  Automatically repairs structures if not given orders.

unit.subzerofallout-proxy.name = Proxy
unit.subzerofallout-proxy.description = Fires a small burst of explosive bullets at enemies.
unit.subzerofallout-proxy.details = Not all units for them are meant for offensive purposes. While they possess these abilities, they are often quite unused.

unit.subzerofallout-unify.name = Unify
unit.subzerofallout-unify.description = Acts as a defensive turret, firing a barrage of shells at enemies in range.
unit.subzerofallout-unify.details = Tyr is a constant shifting surface.  As such, they developed more mobile equipment for their objectives.